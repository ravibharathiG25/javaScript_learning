<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn HTML</title>
</head>
<body>
    <button id="btn">Irukku</button>
</body>
<script>
    let btn = document.getElementById("btn");
    btn.addEventListener("click", () => btn.textContent = "Aana Illa");
    console.log("clicked");

    btn.addEventListener("mouseover", () => btn.textContent = "Oruvela irukkumo");
    console.log("hoverd")

    btn.addEventListener("mouseout", () => btn.textContent = "Irukku");
    console.log("mouse out")

</script>
</html>
